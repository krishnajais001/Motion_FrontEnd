<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Brutalist dark background -->
  <rect width="120" height="120" fill="#000000" />
  
  <!-- Thick white 'M' representing Motion -->
  <path d="M 24 90 
           L 24 30 
           L 60 70 
           L 96 30 
           L 96 90" 
        stroke="#ffffff" 
        stroke-width="16" 
        fill="none" 
        stroke-linejoin="miter" 
        stroke-linecap="square" />
</svg>
